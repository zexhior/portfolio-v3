name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main # Déclenche le workflow lors d'un push sur la branche main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code source du dépôt
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configure Docker Buildx (permet des builds plus rapides et avancés)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Connexion à Docker Hub en utilisant les secrets configurés
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build de l'image et Push automatique sur Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true

          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.VPS_CONTAINER_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.VPS_CONTAINER_NAME }}:${{ github.sha }}
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # Attend la fin réussie du build avant de déployer

    steps:
      - name: Executing remote SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Connexion à Docker Hub sur le VPS (Optionnel si le repo est public)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # 2. Récupération de la nouvelle image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.VPS_CONTAINER_NAME }}:latest

            # 3. Arrêt et suppression de l'ancien conteneur s'il existe
            docker stop ${{ secrets.VPS_CONTAINER_NAME }} || true
            docker rm ${{ secrets.VPS_CONTAINER_NAME }} || true

            # 4. Lancement du nouveau conteneur (ajustez les ports selon votre application)
            docker run -d --name ${{ secrets.VPS_CONTAINER_NAME }} --restart always -p 5378:5378 ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.VPS_CONTAINER_NAME }}:latest

            # 5. Nettoyage des anciennes images inutilisées pour libérer de l'espace
            docker image prune -f
